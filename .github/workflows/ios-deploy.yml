name: iOS Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number override (optional)"
        required: false

concurrency:
  group: ios-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to TestFlight
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          BUILD_NUMBER=${{ inputs.build_number || github.run_number }}
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Setup Flutter (FVM)
        uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Decode GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Create .env
        run: echo "${{ secrets.DOTENV }}" > .env

      - name: Flutter clean & pub get
        run: flutter clean && flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Setup signing via Match
        run: bundle exec fastlane ios setup_signing
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # MATCH_FORCE: "true"  # Only enable when regenerating certs
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}

      - name: Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.TEAM_ID }}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.smoothandesign.useme</key>
                  <string>match AppStore com.smoothandesign.useme</string>
              </dict>
          </dict>
          </plist>
          PLIST

      - name: Build IPA
        run: flutter build ipa --release --build-number=${{ steps.version.outputs.build_number }} --export-options-plist=ios/ExportOptions.plist

      - name: Find IPA path
        id: ipa
        run: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Found IPA: $IPA_FILE"
          echo "path=${{ github.workspace }}/$IPA_FILE" >> $GITHUB_OUTPUT

      - name: Extract release notes from RELEASE_NOTES.md
        id: notes
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ ! -x scripts/extract_release_notes.sh ]; then
            chmod +x scripts/extract_release_notes.sh || true
          fi
          FR=$(./scripts/extract_release_notes.sh "$VERSION" FR || echo "")
          EN=$(./scripts/extract_release_notes.sh "$VERSION" EN || echo "")
          {
            echo "fr<<RNEOF"
            echo "$FR"
            echo "RNEOF"
            echo "en<<RNEOF"
            echo "$EN"
            echo "RNEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        run: bundle exec fastlane ios deploy
        env:
          IPA_PATH: ${{ steps.ipa.outputs.path }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          RELEASE_NOTES_FR: ${{ steps.notes.outputs.fr }}
          RELEASE_NOTES_EN: ${{ steps.notes.outputs.en }}

      - name: Notify (success)
        if: success()
        uses: ./.github/actions/notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          status: success
          title: "✅ iOS ${{ github.ref_name }} sur TestFlight"
          body: "IPA build #${{ steps.version.outputs.build_number }} uploadé sur TestFlight (processing en cours côté Apple)."
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify (failure)
        if: failure()
        uses: ./.github/actions/notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          status: failure
          title: "❌ iOS build ${{ github.ref_name }} échoué"
          body: "Le build IPA ou l'upload TestFlight a échoué. Voir les logs."
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

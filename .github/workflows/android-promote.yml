name: Android Promote to Production

# Promotes the latest build on the Internal track up to the Production
# track on Google Play. No new build — `fastlane android promote` does
# a track-promote on the existing AAB.
#
# Triggered manually from the dashboard (POST /api/github/promote with
# platform=android).
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes to include with the production rollout (optional)"
        required: false

concurrency:
  group: android-promote
  cancel-in-progress: false

jobs:
  promote:
    name: Promote Internal → Production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Create Google Play service account key
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > /tmp/google-play-key.json

      - name: Resolve current version + extract release notes
        id: notes
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          if [ ! -x scripts/extract_release_notes.sh ]; then
            chmod +x scripts/extract_release_notes.sh || true
          fi
          FR=$(./scripts/extract_release_notes.sh "$VERSION" FR || echo "")
          EN=$(./scripts/extract_release_notes.sh "$VERSION" EN || echo "")
          {
            echo "fr<<RNEOF"
            echo "$FR"
            echo "RNEOF"
            echo "en<<RNEOF"
            echo "$EN"
            echo "RNEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Promote to production
        id: promote
        run: bundle exec fastlane android promote
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_PATH: /tmp/google-play-key.json
          RELEASE_NOTES_FR: ${{ steps.notes.outputs.fr }}
          RELEASE_NOTES_EN: ${{ steps.notes.outputs.en }}

      - name: Resolve current version (for notify)
        id: version
        if: always()
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Notify (success)
        if: success()
        uses: ./.github/actions/notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          status: success
          title: "🎉 Android v${{ steps.version.outputs.version }} promu en Production"
          body: "La track Internal a été promue → Production sur Google Play."
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify (failure)
        if: failure()
        uses: ./.github/actions/notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          status: failure
          title: "❌ Android promote en Production échoué"
          body: "fastlane android promote a échoué. Voir les logs."
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

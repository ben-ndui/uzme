name: iOS Submit to App Store

# Submits the latest TestFlight build for App Store review via
# `fastlane ios promote` (deliver). No new build — uses whatever is
# already on TestFlight.
#
# Triggered manually from the dashboard (POST /api/github/promote with
# platform=ios).
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Notes for the App Store review (optional)"
        required: false

concurrency:
  group: ios-promote
  cancel-in-progress: false

jobs:
  promote:
    name: Submit TestFlight build → App Store review
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Resolve current version + extract release notes
        id: notes
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          if [ ! -x scripts/extract_release_notes.sh ]; then
            chmod +x scripts/extract_release_notes.sh || true
          fi
          FR=$(./scripts/extract_release_notes.sh "$VERSION" FR || echo "")
          EN=$(./scripts/extract_release_notes.sh "$VERSION" EN || echo "")
          {
            echo "fr<<RNEOF"
            echo "$FR"
            echo "RNEOF"
            echo "en<<RNEOF"
            echo "$EN"
            echo "RNEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Submit to App Store
        run: bundle exec fastlane ios promote
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          RELEASE_NOTES_FR: ${{ steps.notes.outputs.fr }}
          RELEASE_NOTES_EN: ${{ steps.notes.outputs.en }}

      - name: Resolve current version (for notify)
        id: version
        if: always()
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Notify (success)
        if: success()
        uses: ./.github/actions/notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          status: success
          title: "🍎 iOS v${{ steps.version.outputs.version }} soumis à la review App Store"
          body: "Le build TestFlight a été soumis à la review Apple."
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify (failure)
        if: failure()
        uses: ./.github/actions/notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          status: failure
          title: "❌ iOS submit App Store échoué"
          body: "fastlane ios promote (deliver) a échoué. Voir les logs."
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

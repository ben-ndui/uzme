name: Android Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number override (optional)"
        required: false

concurrency:
  group: android-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to Google Play
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          BUILD_NUMBER=${{ inputs.build_number || github.run_number }}
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter (FVM)
        uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Create Google Play service account key
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > /tmp/google-play-key.json

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Create .env
        run: echo "${{ secrets.DOTENV }}" > .env

      - name: Flutter clean
        run: flutter clean

      - name: Flutter pub get
        run: flutter pub get

      - name: Build AAB
        run: flutter build appbundle --release --build-number=${{ steps.version.outputs.build_number }}

      - name: Verify AAB exists
        run: |
          echo "Working directory: $(pwd)"
          find build -name "*.aab" 2>/dev/null || echo "No AAB found"
          ls -la build/app/outputs/bundle/release/ 2>/dev/null || echo "Release dir not found"

      - name: Extract release notes from RELEASE_NOTES.md
        id: notes
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ ! -x scripts/extract_release_notes.sh ]; then
            chmod +x scripts/extract_release_notes.sh || true
          fi
          FR=$(./scripts/extract_release_notes.sh "$VERSION" FR || echo "")
          EN=$(./scripts/extract_release_notes.sh "$VERSION" EN || echo "")
          {
            echo "fr<<RNEOF"
            echo "$FR"
            echo "RNEOF"
            echo "en<<RNEOF"
            echo "$EN"
            echo "RNEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write Play Store changelog files
        # Fastlane supply ne supporte plus l'argument `release_notes:` direct
        # depuis 2022 — il faut écrire les changelogs en fichiers per-locale
        # dans fastlane/metadata/android/{locale}/changelogs/default.txt avant
        # l'upload (le Fastfile active skip_upload_changelogs uniquement quand
        # ni FR ni EN ne sont fournis).
        # On passe les release notes via env vars (pas inline) pour gérer
        # proprement les apostrophes/quotes dans le texte FR/EN.
        env:
          NOTES_FR: ${{ steps.notes.outputs.fr }}
          NOTES_EN: ${{ steps.notes.outputs.en }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: |
          set -euo pipefail
          mkdir -p fastlane/metadata/android/fr-FR/changelogs
          mkdir -p fastlane/metadata/android/en-US/changelogs
          if [ -n "$NOTES_FR" ]; then
            printf '%s\n' "$NOTES_FR" > "fastlane/metadata/android/fr-FR/changelogs/${BUILD_NUMBER}.txt"
            printf '%s\n' "$NOTES_FR" > "fastlane/metadata/android/fr-FR/changelogs/default.txt"
          fi
          if [ -n "$NOTES_EN" ]; then
            printf '%s\n' "$NOTES_EN" > "fastlane/metadata/android/en-US/changelogs/${BUILD_NUMBER}.txt"
            printf '%s\n' "$NOTES_EN" > "fastlane/metadata/android/en-US/changelogs/default.txt"
          fi
          echo "--- Written changelog files ---"
          find fastlane/metadata/android -name "*.txt" -exec ls -la {} \;

      - name: Upload to Google Play
        run: bundle exec fastlane android deploy
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_PATH: /tmp/google-play-key.json
          AAB_PATH: ${{ github.workspace }}/build/app/outputs/bundle/release/app-release.aab
          RELEASE_NOTES_FR: ${{ steps.notes.outputs.fr }}
          RELEASE_NOTES_EN: ${{ steps.notes.outputs.en }}

      - name: Notify (success)
        if: success()
        uses: ./.github/actions/notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          status: success
          title: "✅ Android v${{ github.ref_name }} sur Play Internal"
          body: "AAB build #${{ steps.version.outputs.build_number }} uploadé sur la track Internal (draft)."
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify (failure)
        if: failure()
        uses: ./.github/actions/notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          status: failure
          title: "❌ Android build ${{ github.ref_name }} échoué"
          body: "Le build / upload Play Store a échoué. Voir les logs."
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

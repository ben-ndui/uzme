name: Release (bump + tag + deploy)

# One-click release: bump pubspec.yaml, commit, tag, push, then
# dispatch the existing android-deploy.yml and ios-deploy.yml.
#
# Triggered manually from the dashboard
# (POST /api/github/release { bump_type: "patch" | "minor" | "major" }).
#
# Why explicit dispatches at the end:
# A tag pushed by GITHUB_TOKEN does NOT trigger downstream workflows
# (`on: push: tags:`) due to GitHub's anti-recursion safety. So we
# explicitly call `gh workflow run` on the deploy workflows once the
# tag is in place — no PAT required, just `actions: write`.
on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Type of bump"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Bump + tag + dispatch deploys
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump pubspec.yaml
        id: bump
        run: |
          set -euo pipefail
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          BASE=$(echo "$CURRENT" | cut -d'+' -f1)
          BUILD=$(echo "$CURRENT" | cut -d'+' -f2)
          MAJOR=$(echo "$BASE" | cut -d'.' -f1)
          MINOR=$(echo "$BASE" | cut -d'.' -f2)
          PATCH=$(echo "$BASE" | cut -d'.' -f3)

          case "${{ inputs.bump_type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0;;
            minor) MINOR=$((MINOR+1)); PATCH=0;;
            patch) PATCH=$((PATCH+1));;
            *) echo "Unknown bump_type: ${{ inputs.bump_type }}"; exit 1;;
          esac

          NEW_BUILD=$((BUILD+1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_FULL="${NEW_VERSION}+${NEW_BUILD}"

          sed -i "s/^version: .*/version: ${NEW_FULL}/" pubspec.yaml

          echo "previous_full=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "full=${NEW_FULL}" >> "$GITHUB_OUTPUT"

          echo "Bumped ${CURRENT} → ${NEW_FULL}"

      - name: Commit + tag + push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pubspec.yaml
          git commit -m "release: bump to ${{ steps.bump.outputs.full }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Dispatch Android deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run android-deploy.yml \
            --ref "v${{ steps.bump.outputs.version }}"

      - name: Dispatch iOS deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ios-deploy.yml \
            --ref "v${{ steps.bump.outputs.version }}"

      - name: Summary
        run: |
          {
            echo "## 🚀 Release ${{ steps.bump.outputs.full }}"
            echo ""
            echo "- Previous: \`${{ steps.bump.outputs.previous_full }}\`"
            echo "- Tag created: \`v${{ steps.bump.outputs.version }}\`"
            echo "- Android + iOS deploy workflows dispatched"
          } >> "$GITHUB_STEP_SUMMARY"
